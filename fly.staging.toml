# Staging Fly.io app configuration. Deployed automatically by
# .github/workflows/deploy-staging.yml on push to `develop`. Mirror of
# fly.toml except for `app`. Per-env secrets (e.g. DATABASE_URL pointing at
# the staging Supabase project) are set with:
#   flyctl secrets set DATABASE_URL=... --app lux-bus-catchment-api-staging

app = 'lux-bus-catchment-api-staging'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[processes]
  app = 'uvicorn api.main:app --host 0.0.0.0 --port 8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '120s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/ping'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
