services:
  postgis:
    image: postgis/postgis:15-3.3
    container_name: luxbus-postgis
    restart: unless-stopped
    # docker-compose is local-dev only, so it reads .env.local for the
    # POSTGRES_* bootstrap vars. Production runs on Fly.io / Supabase and
    # never touches this file.
    env_file: .env.local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: python:3.11-slim
    container_name: luxbus-api
    restart: unless-stopped
    # Hardcoded for local dev — the api container always talks to the
    # adjacent `postgis` service over the docker network. These values
    # mirror .env.local's POSTGRES_* block. The repo's .env.local /
    # .env.production split is for tools running on the host, not for
    # this container.
    environment:
      DATABASE_URL: postgresql://luxbus:changeme@postgis:5432/luxbus
      PROJECTED_CRS: EPSG:3035
      ENVIRONMENT: development
    working_dir: /app
    volumes:
      - ./api:/app/api
      - ./requirements.txt:/app/requirements.txt:ro
    ports:
      - "8000:8000"
    command: >
      bash -c "pip install --no-cache-dir -r requirements.txt &&
               uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  pgdata:
