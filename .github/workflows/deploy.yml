# This workflow deploys the FRONTEND only (the frontend/ folder) to GitHub Pages.
# The backend (FastAPI + PostGIS) is deployed separately to Fly.io via
# `flyctl deploy`, run manually from a terminal. See README.md and fly.toml.

name: Deploy frontend to GitHub Pages

# Only fires for pushes to `main`. Feature branches do NOT auto-deploy —
# changes must be merged into main to ship. `workflow_dispatch` is kept so
# the deploy can be manually re-run from the Actions tab without a new
# commit (e.g. to recover from a flaky Pages step).
#
# Recommended companion: protect `main` in the GitHub repo settings with
# "Require a pull request before merging" so accidental `git push origin main`
# can't bypass review and trigger a deploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
